<!DOCTYPE html>
<html>
<head>
  <title>PT-1: First Personal Web Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #00e5ff;
      margin-bottom: 20px;
    }
    h1 { font-size: 26px; color: #fff; }
    .reg {
      font-family: monospace;
      color: #00e5ff;
      margin: 8px 0 24px;
      font-size: 14px;
    }
    hr { border-color: #334155; margin-bottom: 20px; }
    h3 { color: #94a3b8; font-size: 13px;
         letter-spacing: 2px; margin-bottom: 14px; }
    ul { list-style: none; }
    ul li {
      background: #0f172a;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">

    <img src="photo.jpg" alt="Usman Yasin">

    <h1>Usman Yasin</h1>
    <p class="reg">4945-FOC/BSCS/F23</p>

    <hr>

    <h3>GROUP MEMBERS</h3>
    <ul>
      <li>Halar Khan — 4947-FOC/BSCS/F23</li>
      <li>Umar AB Rehman — 4952-FOC/BSCS/F23</li>
    </ul>

  </div>
</body>
</html>
